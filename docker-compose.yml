services:
  postgres:
    image: postgres:16-alpine
    container_name: dag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dag
      POSTGRES_PASSWORD: dag
      POSTGRES_DB: dag_engine
    ports:
      - "5432:5432"
    volumes:
      - dag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dag -d dag_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    profiles: ["full"]
    # When BACKEND_IMAGE is set in your environment (e.g.
    # BACKEND_IMAGE=vivek13186/daisy-workflow-backend:latest), compose
    # pulls that image and skips the local build. Unset → builds
    # locally from ./backend.
    image: ${BACKEND_IMAGE:-daisy-workflow-backend:local}
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: dag_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://dag:dag@postgres:5432/dag_engine
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    # /readyz returns 200 only when pg + redis are reachable.
    # Docker's HEALTHCHECK marks the container `unhealthy` after
    # three consecutive failures so the load balancer / orchestrator
    # can route around it.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  frontend:
    profiles: ["full"]
    # Same pattern as backend — set FRONTEND_IMAGE to pull from
    # Docker Hub instead of building locally.
    image: ${FRONTEND_IMAGE:-daisy-workflow-frontend:local}
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: dag_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  dag_pg_data:
