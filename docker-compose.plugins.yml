# External-plugin overlay.
#
# Bring up Daisy + every plugin that ships in plugins-external/ in one
# command:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.plugins.yml \
#     --profile full \
#     up -d
#
# The Jira family ships under its own profile so you can pull it in
# without dragging reddit (or anything else later) along:
#
#   docker compose -f docker-compose.yml -f docker-compose.plugins.yml \
#     --profile jira up -d
#
# Daisy itself doesn't auto-discover these containers — you have to
# install each one once via the admin UI (or `npm run install-plugin
# -- --endpoint http://reddit-plugin:8080`). After that the plugin
# row lives in DB and survives restarts; the worker picks it up at
# boot via registry.loadAll().
#
# Adding more plugins:
#   1. Drop the plugin source under plugins-external/<name>/.
#   2. Add a service block here pointing at its Dockerfile.
#   3. After `up -d`, run `npm run install-plugin -- --endpoint http://<name>-plugin:8080`.
#
# Plugins share the same internal docker network as the backend; the
# install endpoint URL uses the container name, e.g.
# `http://reddit-plugin:8080`.

services:
  reddit-plugin:
    profiles: ["full"]
    build:
      # The SDK now ships on npm as `@daisy-workflow/plugin-sdk`,
      # so plugin containers don't need the repo-root build context
      # anymore. A plugin's own folder is enough for `npm install`
      # to pull the SDK from the registry. Keep this `context: .`
      # only if your Dockerfile still references files outside the
      # plugin folder (e.g. a shared local copy of the SDK during
      # SDK development).
      context: .
      dockerfile: plugins-external/reddit/Dockerfile
    container_name: daisy-plugin-reddit
    restart: unless-stopped
    environment:
      PORT: "8080"
      REDDIT_USER_AGENT: "daisy-workflow/0.2 (+plugin reddit.search)"
    # Internal-only by default. Uncomment to expose for browser
    # testing on the host.
    # ports:
    #   - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Jira family ────────────────────────────────────────────────────
  # Six focused plugins. Each one container, all on port 8080 internally
  # (resolved via their container names in install URLs). After `up -d`,
  # install each:
  #
  #   npm run install-plugin -- --endpoint http://jira-issue-get:8080
  #   npm run install-plugin -- --endpoint http://jira-issue-create:8080
  #   npm run install-plugin -- --endpoint http://jira-issue-update:8080
  #   npm run install-plugin -- --endpoint http://jira-issue-search:8080
  #   npm run install-plugin -- --endpoint http://jira-issue-comment-add:8080
  #   npm run install-plugin -- --endpoint http://jira-issue-transition:8080
  #
  # Auth: each plugin reads a workspace `generic` config (default name
  # "jira") with host / email / apiToken. Create one on the
  # Configurations page in the Daisy UI before running any flows.

  jira-issue-get:
    profiles: ["jira", "full"]
    build:
      context: .
      dockerfile: plugins-external/jira-issue-get/Dockerfile
    container_name: jira-issue-get
    restart: unless-stopped
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  jira-issue-create:
    profiles: ["jira", "full"]
    build:
      context: .
      dockerfile: plugins-external/jira-issue-create/Dockerfile
    container_name: jira-issue-create
