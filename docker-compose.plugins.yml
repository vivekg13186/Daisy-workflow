# External-plugin overlay.
#
# Bring up Daisy + every plugin in one command:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.plugins.yml \
#     --profile full \
#     up -d
#
# Plugin services pull pre-built images from Docker Hub:
#
#   vivek13186/daisy-plugin-jira
#   vivek13186/daisy-plugin-google-sheets
#   vivek13186/daisy-plugin-microsoft-teams
#
# Upgrades are `docker compose pull <svc> && docker compose up -d <svc>`.
# Pin a tag in the image string below (`:0.2.0`, `:latest`, etc.) to
# control which build runs.
#
# The local plugins-external/<plugin>/ folders stay in place for
# offline / SDK-development workflows; swap the `image:` line for a
# `build: { context: ./plugins-external/<plugin> }` block to run from
# source instead.
#
# Per-plugin profiles let you bring up only what you need:
#
#   docker compose -f docker-compose.yml -f docker-compose.plugins.yml \
#     --profile jira up -d
#
# Daisy itself doesn't auto-discover these containers — you have to
# install each one once via the admin UI (or `npm run install-plugin
# -- --endpoint http://<container-name>:8080`). After that the plugin
# row lives in DB and survives restarts; the worker picks it up at
# boot via registry.loadAll().
#
# Plugins share the same internal docker network as the backend; the
# install endpoint URL uses the container name, e.g.
# `http://daisy-jira:8080`.

services:
  reddit-plugin:
    profiles: ["full"]
    build:
      # The SDK now ships on npm as `@daisy-workflow/plugin-sdk`,
      # so plugin containers don't need the repo-root build context
      # anymore. A plugin's own folder is enough for `npm install`
      # to pull the SDK from the registry. Keep this `context: .`
      # only if your Dockerfile still references files outside the
      # plugin folder (e.g. a shared local copy of the SDK during
      # SDK development).
      context: .
      dockerfile: plugins-external/reddit/Dockerfile
    container_name: daisy-plugin-reddit
    restart: unless-stopped
    environment:
      PORT: "8080"
      REDDIT_USER_AGENT: "daisy-workflow/0.2 (+plugin reddit.search)"
    # Internal-only by default. Uncomment to expose for browser
    # testing on the host.
    # ports:
    #   - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Jira plugin ────────────────────────────────────────────────────
  # One container, one Daisy node. The action is selected per-node via the
  # `operation` input (issue.get / issue.create / issue.update / issue.delete
  # / issue.search / issue.comment.add / issue.transition / issue.transitions.list).
  #
  # Auth: workspace `generic` config (default name "jira") holding
  # host / email / apiToken. Create one on the Configurations page in the
  # Daisy UI before running any flows.
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-jira:8080

  daisy-jira:
    profiles: ["jira", "full"]
    image: vivek13186/daisy-plugin-jira:latest
    container_name: daisy-jira
    restart: unless-stopped
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Google Sheets plugin ───────────────────────────────────────────
  # One container, one Daisy node. The action is selected per-node via
  # the `operation` input (sheet.get / sheet.append / sheet.update /
  # sheet.clear / sheet.delete-rows / spreadsheet.create / spreadsheet.get).
  #
  # Auth: workspace `generic` config (default name "google") with a
  # `credentialsJson` field holding the entire service-account JSON file
  # from Google Cloud Console. Share each target spreadsheet with the
  # service account's client_email (Editor for writes, Viewer for reads).
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-google-sheets:8080

  daisy-google-sheets:
    profiles: ["google-sheets", "full"]
    image: vivek13186/daisy-plugin-google-sheets:latest
    container_name: daisy-google-sheets
    restart: unless-stopped
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Microsoft Teams plugin ─────────────────────────────────────────
  # One container, one Daisy node. The action is selected per-node via
  # the `operation` input (team.list / channel.list / channel.create /
  # channel.message.send / channel.message.list / chat.list /
  # chat.message.send / chat.message.list).
  #
  # Auth: workspace `generic` config (default name "microsoft-teams")
  # with tenantId / clientId / clientSecret from an Azure AD (Entra)
  # app registration that has the appropriate Microsoft Graph
  # application permissions. See plugins-external/microsoft-teams/README.md
  # for the permission list and one-time setup.
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-microsoft-teams:8080

  daisy-microsoft-teams:
    profiles: ["microsoft-teams", "full"]
    image: vivek13186/daisy-plugin-microsoft-teams:latest
    container_name: daisy-microsoft-teams
    restart: unless-stopped
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
