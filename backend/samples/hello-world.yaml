name: hello-world
version: "1.0"
description: Trivial linear DAG demonstrating the DSL.
data:
  who: "world"

nodes:
  - name: greet
    action: log
    inputs:
      message: "Hello, ${who}!"

  - name: pause
    action: delay
    inputs:
      ms: 200

  - name: done
    action: log
    inputs:
      message: "finished"

edges:
  - { from: greet, to: pause }
  - { from: pause, to: done }
