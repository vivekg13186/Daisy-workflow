# SPA-aware nginx config for the Daisy-workflow frontend.
#
# Three things to know:
#   1. /api and /ws are proxied to the backend container. The default
#      target is `backend:3000` (the compose service name). Override
#      with the BACKEND_HOST env var if you front nginx with a load
#      balancer that points elsewhere.
#   2. Client-side routes (Vue Router history mode) fall through to
#      index.html — that's why `try_files $uri $uri/ /index.html`
#      is on the SPA location.
#   3. Static assets get aggressive caching; index.html doesn't,
#      so a fresh deploy is visible without a hard refresh.

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;
    server_tokens off;

    # Logs go to stdout / stderr so `docker logs` picks them up.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket upgrade for /ws — needed for the live execution
    # broadcast channel.
    location /ws {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # REST API.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Hashed assets — long-cache them, they're content-addressed.
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The SPA itself. No cache on index.html so a redeploy is visible
    # without a forced refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip text assets on the way out.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
